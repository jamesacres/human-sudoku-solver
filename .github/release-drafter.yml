name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: 'Breaking Changes'
    labels:
      - 'breaking'
  - title: 'New Features'
    labels:
      - 'feat'
  - title: 'Bug Fixes'
    labels:
      - 'fix'
  - title: 'Performance'
    labels:
      - 'perf'
  - title: 'Refactoring'
    labels:
      - 'refactor'
  - title: 'Documentation'
    labels:
      - 'docs'
  - title: 'Chores & Maintenance'
    labels:
      - 'chore'
      - 'build'
      - 'ci'
      - 'style'
      - 'test'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feat'
  patch:
    labels:
      - 'fix'
      - 'perf'
      - 'refactor'
      - 'docs'
      - 'chore'
      - 'build'
      - 'ci'
      - 'style'
      - 'test'
  default: patch

template: |
  ## What's Changed

  $CHANGES
